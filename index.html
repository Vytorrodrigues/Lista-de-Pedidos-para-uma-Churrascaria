<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Pedidos</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <main>
        <section class="logo">
            <img id="hero" src="./brasaAlegria_hero.png" alt="alegria_logo">
            <h1>Lista de Pedidos</h1>
        </section>
        
        <section class="container">
            <form>
                <input id="inputTable" type="text" placeholder="Digite o número da mesa..."></input>
                <input id="inputOrder" type="text" placeholder="Digite seu pedido.."></input>
                <button class="button" type="submit" id="btn">Adicionar Pedido</button>
            </form>
            <ul class="list"></ul>
        </section>
        <footer>
            <p>Copyright© 2026 Lista de pedidos - Vytorrodrigues. Todos os direitos reservados.</p>
            <section>
                <a href="https://github.com/Vytorrodrigues" target="_blank">
                    <i class="fa-brands fa-github"></i>
                </a>
                <a href="https://www.linkedin.com/in/vytor-rodrigues-390257356/" target="_blank">
                    <i class="fa-brands fa-linkedin"></i>
                </a>
            </section>
        </footer>
    </main>
    <script src="./script.js"></script>
</body>
</html>
